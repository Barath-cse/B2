<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockSecure - Blockchain File Integrity System</title>
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- Luxury Typography Pair: Outfit (Brand) & Space Grotesk (Tech) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Content Security Policy: Resolving 'eval' and Resource Access Issues -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' * data: blob:; connect-src 'self' http://localhost:5000 http://127.0.0.1:5000 https://b-securefile-frontend.onrender.com;">

  <!-- Ethers.js Library (v6) -->
  <script src="https://unpkg.com/ethers@6.7.1/dist/ethers.umd.min.js"></script>
  
  <!-- CryptoJS is handled via npm imports – removing redundant and broken CDN script -->
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a14;
      min-height: 100vh;
      display: block;
      color: #fff;
      overflow-x: hidden;
    }
    
    #root {
      width: 100%;
      height: 100%;
    }
  </style>

</head>
<body>
  <div id="root"></div>
</body>
</html>
